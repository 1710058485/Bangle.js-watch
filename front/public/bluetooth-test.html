<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Bluetooth API 测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #1890ff;
      margin-bottom: 30px;
    }
    button {
      background: #1890ff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover {
      background: #40a9ff;
    }
    button:disabled {
      background: #d9d9d9;
      cursor: not-allowed;
    }
    .danger {
      background: #ff4d4f;
    }
    .danger:hover {
      background: #ff7875;
    }
    .info {
      background: #f0f2f5;
      padding: 15px;
      border-radius: 4px;
      margin: 15px 0;
      color: #333;
    }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 14px;
      margin-left: 10px;
    }
    .status.connected {
      background: #52c41a;
      color: white;
    }
    .status.disconnected {
      background: #d9d9d9;
      color: #666;
    }
    .log {
      background: #000;
      color: #0f0;
      padding: 15px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .log-entry {
      margin: 5px 0;
    }
    .error {
      color: #ff4d4f;
    }
    .success {
      color: #52c41a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      🔵 Web Bluetooth API 测试
      <span id="status" class="status disconnected">未连接</span>
    </h1>

    <div class="info">
      <strong>浏览器支持：</strong>
      <span id="support-info">检测中...</span>
    </div>

    <div>
      <button id="connectBtn" onclick="connectDevice()">连接蓝牙设备</button>
      <button id="disconnectBtn" onclick="disconnectDevice()" disabled class="danger">断开连接</button>
      <button onclick="getBattery()" id="batteryBtn" disabled>获取电池电量</button>
      <button onclick="getDeviceInfo()" id="infoBtn" disabled>获取设备信息</button>
    </div>

    <div id="deviceInfo" class="info" style="display: none;">
      <h3>设备信息</h3>
      <div id="deviceDetails"></div>
    </div>

    <div class="log" id="log">
      <div class="log-entry">等待操作...</div>
    </div>
  </div>

  <script>
    let device = null;
    let server = null;

    window.addEventListener('DOMContentLoaded', () => {
      const supportInfo = document.getElementById('support-info');
      if ('bluetooth' in navigator) {
        supportInfo.innerHTML = '<span class="success">✓ 支持 Web Bluetooth API</span>';
        log('浏览器支持 Web Bluetooth API', 'success');
      } else {
        supportInfo.innerHTML = '<span class="error">✗ 不支持 Web Bluetooth API</span>';
        log('浏览器不支持 Web Bluetooth API，请使用 Chrome、Edge 或 Opera', 'error');
        document.getElementById('connectBtn').disabled = true;
      }
    });

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function connectDevice() {
      try {
        log('正在扫描蓝牙设备...');
        
        device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [
            'battery_service',
            'device_information',
            '0000180a-0000-1000-8000-00805f9b34fb',
            '0000180f-0000-1000-8000-00805f9b34fb'
          ]
        });

        log(`选择了设备: ${device.name || '未命名设备'}`, 'success');

        device.addEventListener('gattserverdisconnected', onDisconnected);

        log('正在连接到设备...');
        server = await device.gatt.connect();
        
        log('连接成功！', 'success');
        updateUI(true);

      } catch (error) {
        log(`连接失败: ${error.message}`, 'error');
        console.error(error);
      }
    }

    function disconnectDevice() {
      if (device && device.gatt.connected) {
        device.gatt.disconnect();
        log('已断开连接', 'success');
      }
    }

    function onDisconnected() {
      log('设备已断开连接', 'error');
      updateUI(false);
    }

    async function getBattery() {
      try {
        log('正在获取电池电量...');
        const service = await server.getPrimaryService('battery_service');
        const characteristic = await service.getCharacteristic('battery_level');
        const value = await characteristic.readValue();
        const battery = value.getUint8(0);
        log(`电池电量: ${battery}%`, 'success');
        alert(`电池电量: ${battery}%`);
      } catch (error) {
        log(`获取电池电量失败: ${error.message}`, 'error');
      }
    }

    async function getDeviceInfo() {
      try {
        log('正在获取设备信息...');
        const deviceInfoDiv = document.getElementById('deviceInfo');
        const detailsDiv = document.getElementById('deviceDetails');
        
        let html = `<p><strong>设备名称:</strong> ${device.name || '未命名'}</p>`;
        html += `<p><strong>设备 ID:</strong> ${device.id}</p>`;

        try {
          const service = await server.getPrimaryService('device_information');
          
          try {
            const char = await service.getCharacteristic('manufacturer_name_string');
            const value = await char.readValue();
            const manufacturer = new TextDecoder().decode(value);
            html += `<p><strong>制造商:</strong> ${manufacturer}</p>`;
          } catch (e) {
            log('无法获取制造商信息');
          }

          try {
            const char = await service.getCharacteristic('model_number_string');
            const value = await char.readValue();
            const model = new TextDecoder().decode(value);
            html += `<p><strong>型号:</strong> ${model}</p>`;
          } catch (e) {
            log('无法获取型号信息');
          }

        } catch (error) {
          log('设备不支持设备信息服务');
        }

        detailsDiv.innerHTML = html;
        deviceInfoDiv.style.display = 'block';
        log('设备信息获取完成', 'success');

      } catch (error) {
        log(`获取设备信息失败: ${error.message}`, 'error');
      }
    }

    function updateUI(connected) {
      const status = document.getElementById('status');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const batteryBtn = document.getElementById('batteryBtn');
      const infoBtn = document.getElementById('infoBtn');

      if (connected) {
        status.textContent = '已连接';
        status.className = 'status connected';
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        batteryBtn.disabled = false;
        infoBtn.disabled = false;
      } else {
        status.textContent = '未连接';
        status.className = 'status disconnected';
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        batteryBtn.disabled = true;
        infoBtn.disabled = true;
        document.getElementById('deviceInfo').style.display = 'none';
      }
    }
  </script>
</body>
</html>
